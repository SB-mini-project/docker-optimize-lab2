<svg viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="barBefore" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="barAfter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="barBuildB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="barBuildA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <rect width="720" height="360" fill="url(#bg2)" rx="12"/>
  <rect width="720" height="360" fill="none" stroke="#e2e8f0" stroke-width="1.5" rx="12"/>

  <text x="360" y="36" text-anchor="middle" fill="#1e293b" font-size="15" font-weight="bold" letter-spacing="1">Benchmark Results</text>

  <!-- === IMAGE SIZE SECTION === -->
  <text x="60" y="66" fill="#64748b" font-size="11" letter-spacing="1" font-weight="bold">IMAGE SIZE (MB)</text>

  <!-- Grid lines -->
  <line x1="60" y1="160" x2="660" y2="160" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="60" y1="130" x2="660" y2="130" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="60" y1="100" x2="660" y2="100" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="60" y1="70"  x2="660" y2="70"  stroke="#e2e8f0" stroke-width="1"/>
  <text x="50" y="163" text-anchor="end" fill="#94a3b8" font-size="9">0</text>
  <text x="50" y="133" text-anchor="end" fill="#94a3b8" font-size="9">100</text>
  <text x="50" y="103" text-anchor="end" fill="#94a3b8" font-size="9">200</text>
  <text x="50" y="73"  text-anchor="end" fill="#94a3b8" font-size="9">300</text>

  <!-- Bar: Before 222.3MB → 222.3 * 0.4 = 88.9px -->
  <rect x="155" y="71.1" width="90" height="88.9" rx="5" fill="url(#barBefore)"/>
  <text x="200" y="66" text-anchor="middle" fill="#dc2626" font-size="13" font-weight="bold">222.3</text>
  <text x="200" y="174" text-anchor="middle" fill="#64748b" font-size="10">Before (JDK)</text>

  <!-- Bar: After 124.9MB → 49.96px -->
  <rect x="295" y="110.0" width="90" height="50.0" rx="5" fill="url(#barAfter)"/>
  <text x="340" y="105" text-anchor="middle" fill="#16a34a" font-size="13" font-weight="bold">124.9</text>
  <text x="340" y="174" text-anchor="middle" fill="#64748b" font-size="10">After (JRE)</text>

  <!-- Reduction callout -->
  <line x1="245" y1="115" x2="295" y2="115" stroke="#15803d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="270" y="107" text-anchor="middle" fill="#15803d" font-size="12" font-weight="bold">↓ 43.8%</text>
  <text x="270" y="122" text-anchor="middle" fill="#15803d" font-size="9">−97.4 MB</text>

  <!-- Side note box -->
  <rect x="430" y="72" width="210" height="86" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="535" y="92" text-anchor="middle" fill="#15803d" font-size="11" font-weight="bold">절감 효과</text>
  <text x="448" y="112" fill="#475569" font-size="10">💾  ECR 저장 비용 절감</text>
  <text x="448" y="129" fill="#475569" font-size="10">🚀  CI/CD pull 속도 향상</text>
  <text x="448" y="146" fill="#475569" font-size="10">🔒  CVE 노출 가능성 감소</text>

  <!-- Divider -->
  <line x1="40" y1="192" x2="680" y2="192" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- === BUILD TIME SECTION === -->
  <text x="60" y="216" fill="#64748b" font-size="11" letter-spacing="1" font-weight="bold">BUILD TIME (ms)</text>

  <!-- Grid -->
  <line x1="60" y1="320" x2="660" y2="320" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="60" y1="295" x2="660" y2="295" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="60" y1="270" x2="660" y2="270" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="60" y1="245" x2="660" y2="245" stroke="#e2e8f0" stroke-width="1"/>
  <text x="50" y="323" text-anchor="end" fill="#94a3b8" font-size="9">0</text>
  <text x="50" y="298" text-anchor="end" fill="#94a3b8" font-size="9">5,000</text>
  <text x="50" y="273" text-anchor="end" fill="#94a3b8" font-size="9">10,000</text>

  <!-- scale: 10000ms = 75px → 8736 = 65.5px, 8572 = 64.3px -->
  <rect x="155" y="254.5" width="90" height="65.5" rx="5" fill="url(#barBuildB)"/>
  <text x="200" y="249" text-anchor="middle" fill="#6366f1" font-size="12" font-weight="bold">8,736</text>
  <text x="200" y="334" text-anchor="middle" fill="#64748b" font-size="10">Before</text>

  <rect x="295" y="255.8" width="90" height="64.3" rx="5" fill="url(#barBuildA)"/>
  <text x="340" y="249" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="bold">8,572</text>
  <text x="340" y="334" text-anchor="middle" fill="#64748b" font-size="10">After</text>

  <!-- Note box -->
  <rect x="430" y="240" width="210" height="70" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="535" y="260" text-anchor="middle" fill="#64748b" font-size="10" font-weight="bold">통계적으로 유의미하지 않음</text>
  <text x="535" y="278" text-anchor="middle" fill="#94a3b8" font-size="9">두 Dockerfile 모두 COPY 레이어</text>
  <text x="535" y="293" text-anchor="middle" fill="#94a3b8" font-size="9">처리량이 동일하기 때문</text>
</svg>
