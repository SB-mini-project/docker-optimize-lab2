  <text x="33" y="100" fill="#94a3b8" font-size="8" letter-spacing="0.5">LAYER 0  ·  FROM</text>
  <text x="33" y="116" fill="#1e293b" font-size="9" font-weight="bold">eclipse-temurin:17-jdk</text>
  <text x="33" y="130" fill="#dc2626" font-size="8">컴파일러 전체 포함</text>
  <text x="33" y="142" fill="#dc2626" font-size="8">불필요하게 무거움</text>

