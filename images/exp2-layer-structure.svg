  <text x="273" y="116" fill="#1e293b" font-size="9" font-weight="bold">eclipse-temurin:17-jre</text>
  <text x="273" y="130" fill="#16a34a" font-size="8">런타임만 포함</text>
  <text x="273" y="142" fill="#16a34a" font-size="8">JDK 불필요 도구 제거</text>

