  <text x="273" y="179" fill="#1e293b" font-size="9">apt-get install ffmpeg</text>
  <text x="273" y="193" fill="#16a34a" font-size="8">--no-install-recommends</text>
  <text x="273" y="204" fill="#16a34a" font-size="8">불필요한 추천 패키지 제외</text>

  <rect x="260" y="212" width="212" height="54" rx="6" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/>
