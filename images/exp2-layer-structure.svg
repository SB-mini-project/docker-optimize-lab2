<svg viewBox="0 0 740 520" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <rect width="740" height="520" fill="url(#bg)" rx="12"/>
  <rect width="740" height="520" fill="none" stroke="#e2e8f0" stroke-width="1.5" rx="12"/>

  <text x="370" y="30" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold" letter-spacing="0.5">Layer Structure Comparison — Experiment 2</text>
  <text x="370" y="46" text-anchor="middle" fill="#94a3b8" font-size="9">Animal Diary App (FFmpeg 포함 환경)</text>

