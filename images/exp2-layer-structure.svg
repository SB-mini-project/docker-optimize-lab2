  <text x="513" y="375" fill="#1d4ed8" font-size="8" font-weight="bold">snapshot-deps / application</text>

  <rect x="516" y="398" width="180" height="52" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
