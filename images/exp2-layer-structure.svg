  <text x="33" y="164" fill="#94a3b8" font-size="8" letter-spacing="0.5">LAYER 1  ·  RUN</text>
  <text x="33" y="179" fill="#1e293b" font-size="9">apt-get install ffmpeg</text>
  <text x="33" y="193" fill="#dc2626" font-size="8">추천 패키지까지 전부 설치</text>
  <text x="33" y="204" fill="#dc2626" font-size="8">불필요한 종속 패키지 포함</text>

