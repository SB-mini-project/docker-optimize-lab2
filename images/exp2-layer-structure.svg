  <text x="273" y="302" fill="#1e293b" font-size="9">groupadd / useradd / USER</text>
  <text x="273" y="313" fill="#16a34a" font-size="8">Privilege Escalation 방어</text>

  <rect x="276" y="332" width="180" height="52" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
